<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>周报页面跳转</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f7f7;
      color: #2f3338;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      text-align: center;
    }
    a {
      color: #1a73e8;
      text-decoration: none;
    }
    .hidden-nav {
      display: none;
    }
  </style>
</head>
<body>
  <nav class="hidden-nav top-nav">
    <div class="top-nav-inner">
      <a href="week1.html">Week 1</a>
      <a href="week2.html">Week 2</a>
      <a href="week3.html">Week 3</a>
      <a href="week4.html">Week 4</a>
    </div>
  </nav>
  <div>
    <p>正在跳转到最新周报...</p>
    <p>如果未自动跳转，请点击 <a id="latest-link" href="week4.html">最新周报</a>.</p>
  </div>
  <script>
    (function() {
      var navLinks = document.querySelectorAll('.top-nav-inner a[href^="week"]');
      var latestHref = null;
      if (navLinks.length) {
        latestHref = navLinks[navLinks.length - 1].href;
      } else {
        latestHref = document.getElementById('latest-link').href;
      }
      if (latestHref) {
        window.location.replace(latestHref);
      }
    })();
  </script>
</body>
</html>
