function renderLyricsLine(text, active) {
  return `<span class="lyrics-line ${active ? 'active' : ''}">${text}</span>`;
}

const lyrics = ['这是第一行歌词', '这是第二行歌词', '这是第三行歌词'];

lyrics.forEach((line, index) => {
  document.body.insertAdjacentHTML('beforeend', renderLyricsLine(line, index === 0));
});
</code></pre>
